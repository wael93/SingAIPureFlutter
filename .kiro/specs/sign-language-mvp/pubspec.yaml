name: sign_language_mvp
description: A Flutter-based sign language translation MVP for NGOs.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.14.0
  freezed: ^2.4.0
  freezed_annotation: ^2.4.0
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  
  # Audio and STT
  record: ^4.5.0
  flutter_whisper: ^2.0.0
  tflite_flutter: ^0.10.4
  
  # Networking
  http: ^1.2.0
  connectivity_plus: ^5.0.2
  
  # UI Components
  flutter_svg: ^2.0.9
  video_player: ^2.8.0
  permission_handler: ^11.1.0
  
  # Utilities
  crypto: ^3.0.3
  uuid: ^4.3.3
  logger: ^2.2.0
  
  # Build Dependencies
  build_runner: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/sounds/
    - assets/models/
